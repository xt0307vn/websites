<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .element {
            width: 500px;
            height: 500px;
            background-color: red;
            position: relative;
            margin: 0 auto;
            z-index: auto;
            border: 5px solid yellow;
        }

        .element::before {
            content: "";
            width: 110%;
            height: 110%;
            position: absolute;
            top: 0;
            left: -75%;
            background-color: blue;
            z-index: -12;
        }

        .element::after {
            content: "";
            width: 110%;
            height: 110%;
            position: absolute;
            top: 0;
            left: 75%;
            background-color: rgba(0, 128, 0, 1);
            z-index: 2;
        }

        body::before {
            content: "";
            width: 1000px;
            height: 500px;
            position: absolute;
            top: 0;
            left: 0%;
            background-color: purple;
            z-index: 1;
        }

        .e2 {
            width: 300px;
            height: 700px;
            background-color: pink;
            position: relative;
            margin: 0 auto;
            z-index: -8;
            border: 5px solid yellow;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>

<body>
    <div class="element">
    </div>
    <div class="e2">
    </div>
</body>

</html>
